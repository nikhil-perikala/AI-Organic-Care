name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'backend/organic-care-api.service'

jobs:
  # ── 1. Run tests before deploying ─────────────────────────────────────────
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16   # includes pgvector extension
        env:
          POSTGRES_USER: organic_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: organic_care_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TESTING: "1"
      DATABASE_URL: postgresql+asyncpg://organic_user:testpassword@localhost:5432/organic_care_test
      SECRET_KEY: ci-test-secret-key-not-used-in-production-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OPENAI_API_KEY: sk-placeholder-not-called-in-tests
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_DIMENSIONS: "1536"
      APP_ENV: test
      APP_NAME: Organic Care AI
      REDIS_URL: redis://localhost:6379/0
      FRONTEND_URL: http://localhost:4200
      BACKEND_CORS_ORIGINS: '["http://localhost:4200"]'
      LOG_LEVEL: WARNING
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_TLS: "true"
      SMTP_USER: test@example.com
      SMTP_PASSWORD: placeholder
      SMTP_FROM: noreply@test.com

    steps:
      - uses: actions/checkout@v4

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=testpassword psql \
            -h localhost -U organic_user -d organic_care_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ── 2. Deploy to EC2 (only if tests pass) ─────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test          # blocked until test job succeeds

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true

          script: |
            set -euo pipefail

            cd ~/AI-Organic-Care

            # Save rollback point before touching anything
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "$PREV_COMMIT" > /tmp/organic-care-prev-commit
            echo "Rollback point: $(git log --oneline -1)"

            # Reset --hard is safer than git pull:
            # pull fails if EC2 has any local modifications; reset never does
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            echo "Deployed: $(git log --oneline -1)"

            echo "Activating backend environment..."
            cd backend
            source .venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt --quiet

            # Re-apply systemd service file if it changed (uses tee, no cp permission needed)
            if ! diff -q ~/AI-Organic-Care/backend/organic-care-api.service \
                         /etc/systemd/system/organic-care-api.service > /dev/null 2>&1; then
              echo "Service file changed — updating systemd..."
              sudo tee /etc/systemd/system/organic-care-api.service \
                < ~/AI-Organic-Care/backend/organic-care-api.service > /dev/null
              sudo systemctl daemon-reload
            fi

            echo "Running database migrations..."
            # If alembic has no version history (fresh EC2 DB with existing schema),
            # stamp at 001 so Alembic skips table creation and only applies new migrations.
            if ! alembic current 2>/dev/null | grep -qE "001|002"; then
              echo "No Alembic history detected — stamping at 001 (schema already exists)"
              alembic stamp 001
            fi
            alembic upgrade head

            echo "Restarting backend service..."
            sudo systemctl restart organic-care-api

            echo "Waiting for service to start..."
            sleep 5
            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1:8000/health > /dev/null; then
                echo "Local health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done
            echo "Health check failed — service logs:"
            sudo journalctl -u organic-care-api -n 40 --no-pager
            exit 1

      # ── HTTPS check from runner (verifies nginx + SSL + public DNS) ────────
      - name: HTTPS health check
        run: |
          echo "Verifying https://organic-care-api.duckdns.org/health ..."
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 https://organic-care-api.duckdns.org/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "HTTPS health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — retrying in 10 s..."
            sleep 10
          done
          echo "HTTPS health check failed"
          exit 1

      # ── Auto-rollback if any deploy step above failed ──────────────────────
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -f /tmp/organic-care-prev-commit ]; then
              echo "No rollback point found — skipping"
              exit 0
            fi

            PREV=$(cat /tmp/organic-care-prev-commit)
            echo "Rolling back to $PREV ..."
            cd ~/AI-Organic-Care
            git reset --hard "$PREV"

            cd backend
            source .venv/bin/activate
            pip install -r requirements.txt --quiet

            # Schema rollback intentionally skipped:
            # migration 001 has no down_revision — downgrading would drop all tables.
            # Code is reverted; DB keeps current schema (compatible with old code).
            sudo systemctl restart organic-care-api
            sleep 5
            curl -sf http://127.0.0.1:8000/health \
              && echo "Rollback successful — service healthy" \
              || echo "WARNING: service still unhealthy after rollback"
