name: Load USDA Foods into DB

on:
  workflow_dispatch:   # manual trigger only — never runs automatically

jobs:
  load:
    name: Load USDA FoodData Central into food_ai_search
    runs-on: ubuntu-latest

    steps:
      - name: Load USDA foods on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            cd ~/AI-Organic-Care/backend
            git fetch origin main && git reset --hard origin/main
            source .venv/bin/activate

            echo "Applying migrations..."
            alembic upgrade head

            echo "Starting USDA data load..."
            USDA_API_KEY=${{ secrets.USDA_API_KEY }} python load_usda.py

            echo "Load complete."
