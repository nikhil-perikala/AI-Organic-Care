name: Diagnose and Fix Foods API

on:
  workflow_dispatch:

jobs:
  diagnose-and-fix:
    name: Diagnose foods endpoint and clear pycache
    runs-on: ubuntu-latest

    steps:
      - name: Diagnose and fix on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            echo "=== WHAT IS ON PORT 8000 ==="
            sudo ss -tlnp | grep 8000 || echo "(nothing found on 8000)"
            sudo fuser 8000/tcp 2>/dev/null || echo "(fuser: nothing)"

            echo ""
            echo "=== KILLING ROGUE PROCESS ON PORT 8000 ==="
            sudo fuser -k 8000/tcp 2>/dev/null && echo "Killed." || echo "(no process to kill)"
            sleep 2

            echo ""
            echo "=== CLEARING ALL PYCACHE ==="
            find ~/AI-Organic-Care/backend -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            find ~/AI-Organic-Care/backend -name "*.pyc" -delete 2>/dev/null || true
            echo "Pycache cleared."

            echo ""
            echo "=== STARTING SERVICE ==="
            sudo systemctl start organic-care-api
            sleep 6

            echo ""
            echo "=== SERVICE STATUS ==="
            sudo systemctl status organic-care-api --no-pager || true

            echo ""
            echo "=== LOCAL CURL TEST ==="
            curl -s "http://127.0.0.1:8000/api/v1/foods/search?q=tomato" || echo "curl failed"

            echo ""
            echo "=== FINAL SERVICE LOGS ==="
            sudo journalctl -u organic-care-api -n 20 --no-pager
