name: Diagnose and Fix Foods API

on:
  workflow_dispatch:

jobs:
  diagnose-and-fix:
    name: Diagnose foods endpoint and clear pycache
    runs-on: ubuntu-latest

    steps:
      - name: Diagnose and fix on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            cd ~/AI-Organic-Care/backend
            git fetch origin main && git reset --hard origin/main
            source .venv/bin/activate
            python db_diagnose.py
