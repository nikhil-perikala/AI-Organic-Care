name: CI/CD — Organic Care AI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: organic_user
          POSTGRES_PASSWORD: organic_pass
          POSTGRES_DB: organic_care_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://organic_user:organic_pass@localhost:5432/organic_care_test
          OPENAI_API_KEY: sk-test
          SECRET_KEY: test-secret-key
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://organic_user:organic_pass@localhost:5432/organic_care_test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test' }}
          SECRET_KEY: test-secret-key
        run: pytest tests/ -v --tb=short || echo "No tests yet"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build:prod

  docker-build:
    name: Docker Build
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t organic-care-backend ./backend

      - name: Build frontend image
        run: docker build -t organic-care-frontend ./frontend
